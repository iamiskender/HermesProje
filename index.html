<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Project Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#0f172a,#1e1b4b);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;color:#e2e8f0;}
.container{background:rgba(30,41,59,0.9);border-radius:16px;padding:48px 56px;text-align:center;max-width:600px;width:90%;box-shadow:0 25px 50px rgba(0,0,0,0.5);}
h1{font-size:2rem;font-weight:700;margin-bottom:12px;}
p{color:#94a3b8;margin-bottom:24px;}
.stats-box{margin-bottom:32px;}
.stats-box p{margin-bottom:8px;color:#cbd5e1;}
button{background:#3b82f6;color:white;border:none;padding:14px 32px;border-radius:8px;font-size:1rem;cursor:pointer;}
button:hover{background:#2563eb;}
</style>
</head>
<body>
<div class="container">
<h1>Hermes Development Platform</h1>
<p>System successfully configured and running on UTF-8 standard.</p>
<div class="stats-box">
<p>Project Status: <span style="color:#4ade80;font-weight:bold;">Active</span></p>
<p>Developer: <span style="color:#60a5fa;">iamiskender</span></p>
</div>
<button id="testBtn">Check System Status</button>
</div>
<script src="app.js"></script>
</body>
</html>
